<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | 服务器使用维护</title>
  <style>
    :root {
      --bg: #f4f2ea;
      --paper: rgba(255, 251, 245, 0.86);
      --panel: rgba(255, 253, 248, 0.94);
      --line: rgba(100, 79, 51, 0.16);
      --text: #2d2418;
      --muted: #76644d;
      --accent: #1e6b5c;
      --accent-strong: #0f4d42;
      --danger: #bf4b45;
      --shadow: 0 20px 56px rgba(58, 41, 14, 0.14);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(30, 107, 92, 0.14), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(212, 138, 34, 0.18), transparent 22%),
        linear-gradient(180deg, #faf7f1 0%, #efe9dd 100%);
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(1080px, 100%);
      display: grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap: 22px;
      align-items: stretch;
    }

    .hero,
    .login-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .hero {
      position: relative;
      padding: 34px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 560px;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -56px;
      bottom: -96px;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(30, 107, 92, 0.2), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 5vw, 4.6rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .lead {
      margin: 18px 0 0;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 1rem;
    }

    .highlights {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .highlight {
      padding: 16px;
      border-radius: 18px;
      border: 1px solid rgba(30, 107, 92, 0.12);
      background: rgba(255, 255, 255, 0.7);
    }

    .highlight strong,
    .highlight span {
      display: block;
    }

    .highlight strong {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    .highlight span {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .hero-footer {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      padding-top: 26px;
    }

    .hero-footer p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 420px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(30, 107, 92, 0.1);
      color: var(--accent-strong);
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .login-card {
      padding: 28px;
      display: grid;
      align-content: center;
    }

    .login-card h2 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: -0.04em;
    }

    .login-card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(100, 79, 51, 0.2);
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
    }

    input:focus {
      outline: 2px solid rgba(30, 107, 92, 0.2);
      border-color: rgba(30, 107, 92, 0.45);
    }

    .hint {
      margin-top: -2px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      transition: transform 140ms ease, opacity 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.72;
      cursor: wait;
      transform: none;
    }

    .message {
      min-height: 22px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--accent);
    }

    @media (max-width: 920px) {
      .page {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
      }

      .highlights {
        grid-template-columns: 1fr;
      }

      .hero-footer {
        flex-direction: column;
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="系统介绍">
      <div>
        <p class="eyebrow">Server Usage Maintenance</p>
        <h1>服务器资源一页掌控</h1>
        <p class="lead">
          登录后即可进入服务器管理页，查看 GPU 实时占用、提交新申请、审核预约，并维护完整的历史记录。
          入口改成了应用内登录，不再依赖浏览器弹窗。
        </p>
        <div class="highlights">
          <article class="highlight">
            <strong>实时状态</strong>
            <span>按服务器与 GPU 卡位展示当前占用，空闲资源一眼可见。</span>
          </article>
          <article class="highlight">
            <strong>预约审核</strong>
            <span>新增申请先进入审核列表，管理员确认后自动纳入统计。</span>
          </article>
          <article class="highlight">
            <strong>历史可追溯</strong>
            <span>保留任务起止时间、占用卡数与备注，支持 TXT 导出。</span>
          </article>
        </div>
      </div>

      <div class="hero-footer">
        <p>当前登录仅需填写账号，输入正确账号后会直接进入服务器管理页面。</p>
        <span class="badge">授权账号：ausim</span>
      </div>
    </section>

    <section class="login-card" aria-label="登录表单">
      <div>
        <h2>登录系统</h2>
        <p>请输入授权账号进入服务器管理页面。</p>
      </div>

      <form id="login-form">
        <label for="username">
          账号
          <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入账号" required>
        </label>
        <div class="hint">当前仅开放账号 `ausim` 登录。</div>
        <button id="login-button" type="submit">进入服务器管理页</button>
        <div class="message" id="login-message" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const usernameInput = document.getElementById("username");
    const loginButton = document.getElementById("login-button");
    const loginMessage = document.getElementById("login-message");

    function setMessage(message, type = "") {
      loginMessage.textContent = message;
      loginMessage.className = type ? `message ${type}` : "message";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginButton.disabled = true;
      setMessage("");

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: usernameInput.value.trim()
          })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "登录失败");
        }

        setMessage(data.message || "登录成功，正在跳转。", "success");
        window.location.href = data.redirect_to || "/app";
      } catch (error) {
        setMessage(error.message, "error");
        usernameInput.focus();
        usernameInput.select();
      } finally {
        loginButton.disabled = false;
      }
    });

    usernameInput.focus();
  </script>
</body>
</html>
