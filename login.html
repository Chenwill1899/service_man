<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | 服务器使用维护</title>
  <style>
    :root {
      --bg: #f4f2ea;
      --paper: rgba(255, 251, 245, 0.86);
      --panel: rgba(255, 253, 248, 0.94);
      --line: rgba(100, 79, 51, 0.16);
      --text: #2d2418;
      --muted: #76644d;
      --accent: #1e6b5c;
      --accent-strong: #0f4d42;
      --danger: #bf4b45;
      --shadow: 0 20px 56px rgba(58, 41, 14, 0.14);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(30, 107, 92, 0.14), transparent 28%),
        radial-gradient(circle at 85% 18%, rgba(212, 138, 34, 0.18), transparent 22%),
        linear-gradient(180deg, #faf7f1 0%, #efe9dd 100%);
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(460px, 100%);
    }

    .login-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-strong);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .login-card {
      padding: 28px;
      display: grid;
      align-content: center;
    }

    .login-card p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(100, 79, 51, 0.2);
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
    }

    input:focus {
      outline: 2px solid rgba(30, 107, 92, 0.2);
      border-color: rgba(30, 107, 92, 0.45);
    }

    .hint {
      margin-top: -2px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      transition: transform 140ms ease, opacity 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.72;
      cursor: wait;
      transform: none;
    }

    .message {
      min-height: 22px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .message.error {
      color: var(--danger);
    }

    .message.success {
      color: var(--accent);
    }

  </style>
</head>
<body>
  <main class="page">
    <section class="login-card" aria-label="登录表单">
      <div>
        <p class="eyebrow">Server Usage Maintenance</p>
        <h1>登录</h1>
        <p>请输入账号进入服务器管理页面。</p>
      </div>

      <form id="login-form">
        <label for="username">
          账号
          <input id="username" name="username" type="text" autocomplete="username" placeholder="请输入账号" required>
        </label>
        
        <button id="login-button" type="submit">进入服务器管理页</button>
        <div class="message" id="login-message" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("login-form");
    const usernameInput = document.getElementById("username");
    const loginButton = document.getElementById("login-button");
    const loginMessage = document.getElementById("login-message");

    function setMessage(message, type = "") {
      loginMessage.textContent = message;
      loginMessage.className = type ? `message ${type}` : "message";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginButton.disabled = true;
      setMessage("");

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: usernameInput.value.trim()
          })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "登录失败");
        }

        setMessage(data.message || "登录成功，正在跳转。", "success");
        window.location.href = data.redirect_to || "/app";
      } catch (error) {
        setMessage(error.message, "error");
        usernameInput.focus();
        usernameInput.select();
      } finally {
        loginButton.disabled = false;
      }
    });

    usernameInput.focus();
  </script>
</body>
</html>
